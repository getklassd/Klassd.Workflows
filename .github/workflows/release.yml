name: Release

# Push a tag like `v0.1.0-beta.1` to cut a release: the version is derived from
# the tag, all packable src projects are packed, pushed to NuGet.org, and a
# GitHub Release is created with the .nupkg/.snupkg attached. In parallel the
# Worker base image is built and pushed to GHCR (consumers layer their job DLLs
# onto it, or build their own image with the Klassd.Workflows.Worker package).
on:
  push:
    tags:
      - 'v*'
  # Manual image-only run: dispatch on a branch with the version to (re)build and push
  # the worker image for an already-published release without re-publishing NuGet packages.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the worker image (e.g. 0.2.0-beta.1)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Pack + push to NuGet.org
    if: github.event_name == 'push'    # tag push only; manual dispatch is image-only
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the GitHub Release
      id-token: write        # OIDC token for NuGet.org Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Tag `v0.1.0-beta.1` -> version `0.1.0-beta.1`. A `-` marks a prerelease.
      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing $VERSION (prerelease: ${VERSION#*-})"

      - name: Build
        run: dotnet build Klassd.Workflows.slnx -c Release -p:Version=${{ steps.version.outputs.version }}

      # Solution pack emits only IsPackable=true projects (the shipped src libraries).
      # IncludeSymbols/snupkg are configured in Directory.Build.props.
      - name: Pack
        run: dotnet pack Klassd.Workflows.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h)
      # NuGet.org API key. No long-lived secret to store. Done right before push
      # since the temp key expires in an hour. NUGET_USER is your nuget.org profile
      # name (not email); set it as a repo secret. Requires a matching trusted
      # publishing policy on nuget.org (owner=getklassd, repo=Klassd.Workflows, workflow=release.yml).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Pushing the .nupkg also pushes the adjacent .snupkg symbol package.
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
          artifacts/*.nupkg artifacts/*.snupkg

  # The generic worker base image: the worker host with no jobs of its own.
  # Consumers layer their published job DLLs onto it (FROM ghcr.io/getklassd/workflows-worker),
  # or build their own image with the Klassd.Workflows.Worker package.
  worker-image:
    name: Build + push worker base image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr.io/getklassd/*
    steps:
      - uses: actions/checkout@v6

      # Use the dispatch input when present, otherwise derive from the pushed tag.
      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # `:latest` tracks the most recent release (incl. betas) while in 0.x; pin to the
      # version tag for reproducible builds. Single-arch (amd64) for now.
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Klassd.Workflows.Worker.App/Dockerfile
          push: true
          tags: |
            ghcr.io/getklassd/workflows-worker:${{ steps.version.outputs.version }}
            ghcr.io/getklassd/workflows-worker:latest
